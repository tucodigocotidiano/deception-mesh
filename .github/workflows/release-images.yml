name: Release Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata control_plane
        id: meta_control_plane
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/deceptionmesh-control-plane
          tags: |
            type=ref,event=tag
            type=sha,format=short,prefix=sha-

      - name: Metadata sensor_agent
        id: meta_sensor_agent
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/deceptionmesh-sensor-agent
          tags: |
            type=ref,event=tag
            type=sha,format=short,prefix=sha-

      - name: Build and push control_plane
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/control_plane.Dockerfile
          push: true
          tags: ${{ steps.meta_control_plane.outputs.tags }}
          labels: ${{ steps.meta_control_plane.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push sensor_agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/sensor_agent.Dockerfile
          push: true
          tags: ${{ steps.meta_sensor_agent.outputs.tags }}
          labels: ${{ steps.meta_sensor_agent.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max