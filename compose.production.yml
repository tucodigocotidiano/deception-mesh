services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - dm_pgdata:/var/lib/postgresql/data
      - ./deploy/sql_prod:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - dm_internal

  control_plane:
    image: ${CONTROL_PLANE_IMAGE}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RUST_LOG: ${CONTROL_PLANE_LOG_LEVEL:-info}
      BIND_ADDR: 0.0.0.0:8080
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-3600}
      DEV_ALLOW_X_USER_ID: "0"
      SENSOR_TOKEN_PEPPER: ${SENSOR_TOKEN_PEPPER}
      SENSOR_ENROLL_TTL_SECONDS: ${SENSOR_ENROLL_TTL_SECONDS:-3600}
      SENSOR_OFFLINE_AFTER_SECONDS: ${SENSOR_OFFLINE_AFTER_SECONDS:-300}
      MIGRATIONS_DIR: /app/sql_prod
      SEVERITY_REPEAT_WINDOW_SECONDS: ${SEVERITY_REPEAT_WINDOW_SECONDS:-600}
      SEVERITY_MEDIUM_THRESHOLD: ${SEVERITY_MEDIUM_THRESHOLD:-3}
      SEVERITY_HIGH_THRESHOLD: ${SEVERITY_HIGH_THRESHOLD:-5}
      SEVERITY_CRITICAL_THRESHOLD: ${SEVERITY_CRITICAL_THRESHOLD:-10}
      SEVERITY_DECOY_LEVEL: ${SEVERITY_DECOY_LEVEL:-high}
      SEVERITY_CREDENTIAL_DECOY_LEVEL: ${SEVERITY_CREDENTIAL_DECOY_LEVEL:-critical}
      WEBHOOK_TIMEOUT_SECONDS: ${WEBHOOK_TIMEOUT_SECONDS:-5}
      WEBHOOK_RETRY_MAX_ATTEMPTS: ${WEBHOOK_RETRY_MAX_ATTEMPTS:-4}
      WEBHOOK_RETRY_BASE_DELAY_SECONDS: ${WEBHOOK_RETRY_BASE_DELAY_SECONDS:-2}
      WEBHOOK_RETRY_MAX_DELAY_SECONDS: ${WEBHOOK_RETRY_MAX_DELAY_SECONDS:-60}
      WEBHOOK_RETRY_POLL_INTERVAL_MILLIS: ${WEBHOOK_RETRY_POLL_INTERVAL_MILLIS:-500}
    volumes:
      - ./deploy/sql_prod:/app/sql_prod:ro
    ports:
      - "127.0.0.1:${CONTROL_PLANE_HOST_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - dm_internal

  sensor_agent:
    image: ${SENSOR_AGENT_IMAGE}
    restart: unless-stopped
    depends_on:
      control_plane:
        condition: service_healthy
    environment:
      RUST_LOG: ${SENSOR_LOG_LEVEL:-info}
    volumes:
      - ./deploy/runtime/sensor.production.toml:/app/config/sensor.toml:ro
    ports:
      - "${SENSOR_SSH_PORT:-2222}:2222"
      - "${SENSOR_HTTP_PORT:-8081}:8081"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - dm_internal

networks:
  dm_internal:
    driver: bridge

volumes:
  dm_pgdata: