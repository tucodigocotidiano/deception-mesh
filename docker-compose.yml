services:
  postgres:
    image: postgres:16-alpine
    container_name: deceptionmesh-postgres
    environment:
      POSTGRES_DB: deception_mesh
      POSTGRES_USER: deception
      POSTGRES_PASSWORD: deception
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deception -d deception_mesh"]
      interval: 5s
      timeout: 3s
      retries: 10

  control_plane:
    build:
      context: .
      dockerfile: deploy/docker/control_plane.Dockerfile
    container_name: deceptionmesh-control-plane
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RUST_LOG: info
      BIND_ADDR: 0.0.0.0:8080
      DATABASE_URL: postgres://deception:deception@postgres:5432/deception_mesh
      JWT_SECRET: "dev-secret-change-me-please-very-long"
      JWT_TTL_SECONDS: "3600"

      # Solo para quickstart local reproducible
      DEV_ALLOW_X_USER_ID: "1"

      SENSOR_TOKEN_PEPPER: "dev-pepper-change-me"
      SENSOR_ENROLL_TTL_SECONDS: "3600"
      SENSOR_OFFLINE_AFTER_SECONDS: "300"

      MIGRATIONS_DIR: "/app/deploy/sql"

      SEVERITY_REPEAT_WINDOW_SECONDS: "600"
      SEVERITY_MEDIUM_THRESHOLD: "3"
      SEVERITY_HIGH_THRESHOLD: "5"
      SEVERITY_CRITICAL_THRESHOLD: "10"
      SEVERITY_DECOY_LEVEL: "high"
      SEVERITY_CREDENTIAL_DECOY_LEVEL: "critical"

      WEBHOOK_TIMEOUT_SECONDS: "5"
      WEBHOOK_RETRY_MAX_ATTEMPTS: "4"
      WEBHOOK_RETRY_BASE_DELAY_SECONDS: "2"
      WEBHOOK_RETRY_MAX_DELAY_SECONDS: "60"
      WEBHOOK_RETRY_POLL_INTERVAL_MILLIS: "500"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  sensor_agent:
    profiles: ["sensor"]
    build:
      context: .
      dockerfile: deploy/docker/sensor_agent.Dockerfile
    container_name: deceptionmesh-sensor-agent
    depends_on:
      control_plane:
        condition: service_healthy
    volumes:
      - ./deploy/runtime/sensor.toml:/app/config/sensor.toml:ro
    ports:
      - "2222:2222"
      - "127.0.0.1:8081:8081"
      - "8443:8443"
    restart: unless-stopped
    command: ["/usr/local/bin/sensor_agent", "--config", "/app/config/sensor.toml"]

volumes:
  pgdata: